[Rainmeter]

moddedby=abu46
Update=1000
MiddleMouseDownAction=!RainmeterDeactivateConfig
Draggable=1
SavePosition=1

[Variables]
FontFace=Trebuchet MS
FontColor=255,255,255,255
FontSize=11

; ===== CUSTOM POSITION =====
BaseX=7
BaseY=96
GapY=28
GapX=5
GapText=25

[Sleep]
Meter=Image
ImageName=sleepw.png
X=#BaseX#
Y=#BaseY#
W=26
H=26
AntiAlias=1
LeftMouseUpAction=%windir%\System32\rundll32.exe powrprof.dll,SetSuspendState 0,1,0
MouseOverAction=!execute [!RainmeterShowMeter SleepText][!RainmeterRedraw]
MouseLeaveAction=!execute [!RainmeterHideMeter SleepText][!RainmeterRedraw]


[Shutdown]
Meter=Image
ImageName=shutdownw.png
X=(#BaseX# + #GapX#)
Y=(#BaseY# - #GapY#)
W=26
H=26
AntiAlias=1
LeftMouseUpAction=%systemroot%\system32\shutdown.exe -s -t 00
MouseOverAction=!execute [!RainmeterShowMeter ShutdownText][!RainmeterRedraw]
MouseLeaveAction=!execute [!RainmeterHideMeter ShutdownText][!RainmeterRedraw]


[Restart]
Meter=Image
ImageName=restartw.png
X=(#BaseX# + (#GapX# * 2))
Y=(#BaseY# - (#GapY# * 2))
W=26
H=26
MouseOverAction=!execute [!RainmeterShowMeter RestartText][!RainmeterRedraw]
MouseLeaveAction=!execute [!RainmeterHideMeter RestartText][!RainmeterRedraw]
LeftMouseUpAction=!Execute [%windir%\System32\shutdown.exe -r -t 00]


[Lock]
Meter=Image
ImageName=lockw.png
X=(#BaseX# + (#GapX# * 3))
Y=(#BaseY# - (#GapY# * 3))
W=26
H=26
MouseOverAction=!execute [!RainmeterShowMeter LockText][!RainmeterRedraw]
MouseLeaveAction=!execute [!RainmeterHideMeter LockText][!RainmeterRedraw]
LeftMouseUpAction=!Execute [%windir%\System32\rundll32.exe user32.dll LockWorkStation]


[SleepText]
Meter=String
X=(#BaseX# + #GapText#)
Y=#BaseY#
FontFace=#FontFace#
FontSize=10
FontColor=#FontColor#
StringStyle=Bold
AntiAlias=1
Text="sleep"
Hidden=1

[ShutdownText]
Meter=String
X=(#BaseX# + #GapX# + #GapText#)
Y=(#BaseY# - #GapY#)
FontFace=#FontFace#
FontSize=10
FontColor=#FontColor#
StringStyle=Bold
AntiAlias=1
Text="shutdown"
Hidden=1

[RestartText]
Meter=String
X=(#BaseX# + (#GapX# * 2) + #GapText#)
Y=(#BaseY# - (#GapY# * 2))
FontFace=#FontFace#
FontSize=10
FontColor=#FontColor#
StringStyle=Bold
AntiAlias=1
Text="restart"
Hidden=1

[LockText]
Meter=String
X=(#BaseX# + (#GapX# * 3) + #GapText#)
Y=(#BaseY# - (#GapY# * 3))
FontFace=#FontFace#
FontSize=10
FontColor=#FontColor#
StringStyle=Bold
AntiAlias=1
Text="lock"
Hidden=1



