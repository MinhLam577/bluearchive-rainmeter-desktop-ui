[Rainmeter]
Update=1000
DynamicWindowSize=1
ClickThrough=1
Draggable=0

[Metadata]
Name=Blue Archive Controller
Author=MinhDepTrai

[MeasureToggleTaskbar]
Measure=Plugin
Plugin=RunCommand
Program=""#ROOTCONFIGPATH#RunAndHide\check_taskbar.exe""
State=Hide
OutputType=ANSI
FinishAction=[!CommandMeasure TaskbarScript "ToggleTaskbar()"]

[MeasureToggleSwitch]
Measure=Plugin
Plugin=RunCommand
Program=""#ROOTCONFIGPATH#RunAndHide\check_taskbar.exe""
State=Hide
OutputType=ANSI
FinishAction=[!CommandMeasure TaskbarScript "OnCheckComplete()"]

[HubScript]
Measure=Script
ScriptFile=#@#lua\toggleswitch.lua

[TaskbarScript]
Measure=Script
ScriptFile=#@#lua\toggletaskbar.lua

[Dummy]
Meter=String
Text=
Hidden=1